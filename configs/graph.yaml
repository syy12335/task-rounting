model:
  # 默认 provider；可用环境变量 MODEL_PROVIDER 覆盖。
  provider: sglang
  provider_env: MODEL_PROVIDER
  temperature: 0
  request_timeout_sec: 90
  max_retries: 1
  max_tokens: 2048

  providers:
    aliyun:
      name: qwen-flash
      api_key_env: API_KEY_Qwen
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      max_tokens: 2048

    sglang:
      name: qwen35-4b
      api_key_env: SGLANG_API_KEY
      base_url: http://127.0.0.1:30000/v1
      max_tokens: 2048

paths:
  cases_dir: data/cases
  run_root: var/runs
  logs_dir: var/logs

runtime:
  save_logs: true
  max_rounds: 4
  max_task_turns: 4
  max_controller_steps: 3
  max_executor_steps: 4
  default_task_type: executor
  max_failed_retries: 3
  memory_enabled: true
  memory_max_window_tokens: 3000
  memory_compress_target_tokens: 700
  memory_min_step_for_compress: 2
  memory_recent_k_rounds: 2
  memory_tool_trim_head_chars: 800
  memory_tool_trim_tail_chars: 800
  memory_tool_mid_hits_max: 6
  memory_tool_mid_hit_chars: 240
  environment_view_compact_enabled: false
  environment_view_compact_target_tokens: 600
